<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRIVE ARENA – Zugang</title>
  <link rel="stylesheet" href="style.css">
  <script>
    // If already logged in, redirect immediately to dashboard
    if (localStorage.getItem("da_auth") === "1") {
      window.location.replace("dashboard.html");
    }
  </script>
</head>
<body>
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div><span class="logo-d">D</span><span class="logo-rest">RIVE</span></div>
      <span class="logo-sub">ARENA</span>
      <div class="logo-line"></div>
    </div>
    <h2>Investor &amp; Finanzierungsportal</h2>
    <input type="password" id="pw-input" placeholder="Zugangscode" autocomplete="off">
    <button class="login-btn" onclick="checkPw()">ZUGANG</button>
    <div class="login-error" id="pw-error">Falscher Zugangscode</div>
    <div class="login-note">Vertraulich · Nur für autorisierte Personen</div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
